<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pádel Score - Videowall</title>
  <style>
    :root{
      --bg:#eef2f7;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --line:#d9e2ef;
      --text:#142033;
      --muted:#607089;
      --accent:#d4a90a;
      --green:#16a34a;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#f6f8fb,#e9eef5);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{min-height:100vh}
    .wrap{
      width:100vw;min-height:100vh;padding:24px;
      display:grid;grid-template-rows:auto 1fr;gap:18px
    }
    .header{
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(10px);
      border:1px solid rgba(20,32,51,.08);
      box-shadow:var(--shadow);
      border-radius:24px;
      padding:18px 22px;
      display:flex;justify-content:space-between;align-items:center;gap:16px
    }
    .title h1{margin:0;font-size:32px;letter-spacing:.2px}
    .title p{margin:5px 0 0;color:var(--muted);font-size:15px}
    .right{
      display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:flex-end
    }
    .pill{
      padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:14px
    }
    .boards{
      display:grid;grid-template-rows:repeat(3,1fr);gap:16px;min-height:0
    }
    .board{
      background:linear-gradient(180deg,#ffffff,#f9fbfd);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:220px 1.2fr 180px 220px 170px;
      overflow:hidden;
      min-height:0
    }
    .col{
      padding:18px 20px;display:flex;flex-direction:column;justify-content:center
    }
    .col + .col{border-left:1px solid var(--line)}
    .court{
      background:linear-gradient(180deg,#182436,#132033);
      color:#fff
    }
    .court .court-name{font-size:28px;font-weight:700}
    .court .court-sub{font-size:14px;color:#c7d2e3;margin-top:6px}
    .status-tag{
      display:inline-flex;align-self:flex-start;margin-top:16px;padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.1);font-size:13px
    }
    .teams{
      gap:14px
    }
    .team{
      display:grid;grid-template-columns:18px 1fr auto;gap:12px;align-items:center
    }
    .serve-dot{
      width:14px;height:14px;border-radius:50%;background:#cbd5e1
    }
    .serve-dot.active{background:var(--accent);box-shadow:0 0 0 6px rgba(212,169,10,.14)}
    .team-name{font-size:30px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .team-side{font-size:14px;color:var(--muted)}
    .points{
      text-align:center
    }
    .points .label{font-size:14px;color:var(--muted);margin-bottom:8px}
    .points .big{
      font-size:70px;font-weight:700;line-height:1
    }
    .sets, .meta{
      gap:10px
    }
    .set-row, .meta-row{
      display:flex;justify-content:space-between;align-items:center;gap:16px;
      background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:12px 14px
    }
    .set-row .k, .meta-row .k{font-size:13px;color:var(--muted)}
    .set-row .v, .meta-row .v{font-size:22px;font-weight:700}
    .games{
      display:grid;grid-template-columns:1fr 1fr;gap:10px
    }
    .game-box{
      background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:12px 14px;text-align:center
    }
    .game-box .k{font-size:12px;color:var(--muted)}
    .game-box .v{font-size:40px;font-weight:700;margin-top:6px}
    .waiting{
      opacity:.7
    }
    @media (max-width:1200px){
      .board{grid-template-columns:180px 1.2fr 150px 190px 160px}
      .team-name{font-size:24px}
      .points .big{font-size:54px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="title">
        <h1>AG Pádel - Videowall de partidos</h1>
        <p>Formato horizontal para proyector - 3 pistas simultáneas</p>
      </div>
      <div class="right">
        <div class="pill" id="nowClock">00:00</div>
        <div class="pill">Sin backend - prueba piloto</div>
      </div>
    </header>

    <main class="boards" id="boards"></main>
  </div>

  <script>
    const CHANNEL_NAME = "padel-score-sync";
    const bc = "BroadcastChannel" in window ? new BroadcastChannel(CHANNEL_NAME) : null;
    const KEYS = ["match_pista_1", "match_pista_2", "match_pista_3"];
    const pointsMap = ["0","15","30","40"];

    function sampleState(courtName, a, b) {
      const now = Date.now() - Math.floor(Math.random() * 2400000);
      return {
        courtName,
        teamA: a,
        teamB: b,
        points: [2,3],
        games: [4,3],
        sets: [0,1],
        setHistory: ["4-6"],
        server: 0,
        goldenPoint: true,
        inTiebreak: false,
        over: false,
        startedAt: now
      };
    }

    function ensureDemoData() {
      const demos = [
        sampleState("Pista 1", "Navarro / Sanz", "Ortega / Gil"),
        sampleState("Pista 2", "Ferrer / Costa", "Vidal / Moya"),
        sampleState("Pista 3", "Roca / Prat", "Soler / Puig")
      ];
      KEYS.forEach((key, idx) => {
        if (!localStorage.getItem(key)) {
          localStorage.setItem(key, JSON.stringify(demos[idx]));
        }
      });
    }

    function load(key) {
      try {
        return JSON.parse(localStorage.getItem(key));
      } catch {
        return null;
      }
    }

    function fmtDuration(ms) {
      const sec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      return h > 0
        ? `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
        : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function displayPoint(state, idx) {
      const val = state.points?.[idx] ?? 0;
      const opp = state.points?.[1 - idx] ?? 0;

      if (state.inTiebreak) return String(val);

      if (state.goldenPoint) {
        return pointsMap[val] ?? "40";
      }

      if (val >= 3 && opp >= 3) {
        if (val === opp) return "40";
        if (val === opp + 1) return "AD";
        return "40";
      }

      return pointsMap[val] ?? "40";
    }

    function boardTemplate(state, idx) {
      if (!state) {
        return `
          <section class="board waiting">
            <div class="col court">
              <div class="court-name">Pista ${idx + 1}</div>
              <div class="court-sub">Esperando partido</div>
              <div class="status-tag">Sin datos</div>
            </div>
            <div class="col teams">
              <div class="team-name">Partido no iniciado</div>
            </div>
            <div class="col points"><div class="label">Puntos</div><div class="big">-</div></div>
            <div class="col sets"><div class="set-row"><span class="k">Sets</span><span class="v">-</span></div></div>
            <div class="col meta"><div class="meta-row"><span class="k">Tiempo</span><span class="v">00:00</span></div></div>
          </section>
        `;
      }

      const elapsed = fmtDuration(Date.now() - (state.startedAt || Date.now()));
      const status = state.over ? "Finalizado" : (state.inTiebreak ? "Tie break" : "En juego");
      const mode = state.goldenPoint ? "Punto de oro" : "Ventaja";
      const hist = state.setHistory?.length ? state.setHistory.join(" | ") : "-";
      const winnerClassA = state.over && state.winner === 0 ? ' style="color:#16a34a"' : "";
      const winnerClassB = state.over && state.winner === 1 ? ' style="color:#16a34a"' : "";

      return `
        <section class="board">
          <div class="col court">
            <div class="court-name">${state.courtName || `Pista ${idx + 1}`}</div>
            <div class="court-sub">${mode}</div>
            <div class="status-tag">${status}</div>
          </div>

          <div class="col teams">
            <div class="team">
              <span class="serve-dot ${state.server === 0 ? "active" : ""}"></span>
              <div class="team-name"${winnerClassA}>${state.teamA || "Equipo A"}</div>
              <div class="team-side">A</div>
            </div>
            <div class="team">
              <span class="serve-dot ${state.server === 1 ? "active" : ""}"></span>
              <div class="team-name"${winnerClassB}>${state.teamB || "Equipo B"}</div>
              <div class="team-side">B</div>
            </div>
          </div>

          <div class="col points">
            <div class="label">Puntos</div>
            <div class="big">${displayPoint(state,0)} - ${displayPoint(state,1)}</div>
          </div>

          <div class="col sets">
            <div class="games">
              <div class="game-box">
                <div class="k">Juegos A</div>
                <div class="v">${state.games?.[0] ?? 0}</div>
              </div>
              <div class="game-box">
                <div class="k">Juegos B</div>
                <div class="v">${state.games?.[1] ?? 0}</div>
              </div>
            </div>
            <div class="set-row" style="margin-top:10px">
              <span class="k">Sets</span>
              <span class="v">${state.sets?.[0] ?? 0} - ${state.sets?.[1] ?? 0}</span>
            </div>
          </div>

          <div class="col meta">
            <div class="meta-row">
              <span class="k">Tiempo</span>
              <span class="v">${elapsed}</span>
            </div>
            <div class="meta-row">
              <span class="k">Historial</span>
              <span class="v" style="font-size:18px">${hist}</span>
            </div>
          </div>
        </section>
      `;
    }

    function render() {
      const container = document.getElementById("boards");
      const all = KEYS.map(load);
      container.innerHTML = all.map((state, idx) => boardTemplate(state, idx)).join("");
      document.getElementById("nowClock").textContent = new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
    }

    ensureDemoData();

    if (bc) bc.onmessage = render;
    window.addEventListener("storage", (e) => {
      if (KEYS.includes(e.key) || e.key === "padel_score_broadcast") render();
    });

    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
