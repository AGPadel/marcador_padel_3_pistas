<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<title>AG Pádel · Mando</title>
<style>
:root{
  --bg:#0a0f1e;--surface:#131d30;--border:rgba(255,255,255,0.08);
  --text:#f1f5f9;--muted:#475569;--accent:#c9a84c;
  --t1:#3b82f6;--t2:#ef4444;--green:#22c55e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;}

.app{width:100vw;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,12px) 16px env(safe-area-inset-bottom,16px);gap:10px;}

/* STATUS BAR */
.status{display:flex;align-items:center;justify-content:space-between;width:100%;padding-top:8px;}
.status-left{display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.red{background:var(--t2);}
.dot.yellow{background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-txt{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.pista-sel{display:flex;gap:4px;}
.ps-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.65rem;font-weight:700;letter-spacing:1px;padding:4px 10px;cursor:pointer;transition:all .15s;}
.ps-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.1);}

/* SCORE DISPLAY */
.score-display{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;width:100%;
  display:flex;flex-direction:column;gap:6px;
}
.score-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.score-name{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-name.s1{color:var(--t1);}
.score-name.s2{color:var(--t2);}
.score-pts{font-size:1.6rem;font-weight:900;font-variant-numeric:tabular-nums;min-width:44px;text-align:right;}
.score-pts.s1{color:var(--t1);}
.score-pts.s2{color:var(--t2);}
.score-sets{font-size:.7rem;font-weight:700;color:var(--muted);min-width:28px;text-align:right;}
.score-games{font-size:.7rem;font-weight:700;color:var(--muted);min-width:28px;text-align:right;}
.score-divider{height:1px;background:var(--border);}
.score-meta{display:flex;align-items:center;justify-content:center;gap:10px;}
.score-badge{font-size:.52rem;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:20px;font-weight:700;}
.badge-tb{background:rgba(201,168,76,.15);color:var(--accent);}
.badge-gold{background:rgba(201,168,76,.1);color:var(--accent);}
.badge-adv{background:rgba(239,68,68,.1);color:var(--t2);}
.score-serve{font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--green);}
.col-header{font-size:.42rem;letter-spacing:2px;text-transform:uppercase;color:#1e293b;text-align:right;}
.score-header{display:grid;grid-template-columns:1fr 44px 28px 28px;align-items:center;gap:8px;}
.score-grid{display:grid;grid-template-columns:1fr 44px 28px 28px;align-items:center;gap:8px;}

/* ACTION BUTTONS */
.action-area{display:flex;flex-direction:column;gap:10px;width:100%;}
.main-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.score-btn{
  border:none;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;padding:20px 10px;gap:4px;
  transition:transform .08s, filter .08s;
  -webkit-user-select:none;
  min-height:120px;
}
.score-btn:active{transform:scale(.93);filter:brightness(1.2);}
.score-btn.b1{background:linear-gradient(150deg,#1d4ed8,#1e3a8a);border:1px solid rgba(147,197,253,.15);}
.score-btn.b2{background:linear-gradient(150deg,#dc2626,#7f1d1d);border:1px solid rgba(252,165,165,.15);}
.btn-label{font-size:.6rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);}
.btn-name{font-size:.8rem;font-weight:800;letter-spacing:1px;color:#fff;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-ico{font-size:1.8rem;line-height:1;}

.secondary-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;transition:background .12s;
}
.sec-btn:active{background:#1e293b;}
.sec-btn .ico{font-size:1.2rem;}
.sec-btn .lbl{font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;}

/* FEEDBACK */
.feedback{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;min-height:1.2em;transition:color .2s;}
.feedback.ok{color:var(--green);}
.feedback.err{color:var(--t2);}

/* SETUP */
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-overlay.hidden{display:none;}
.setup-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.setup-title{font-size:1.1rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.setup-sub{font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5;}
.setup-input{background:#0f172a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;padding:10px 12px;outline:none;width:100%;font-family:monospace;letter-spacing:1px;}
.setup-input:focus{border-color:var(--accent);}
.setup-btn{background:var(--accent);border:none;color:#0f172a;font-size:.9rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:13px;border-radius:10px;cursor:pointer;width:100%;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">⌚ Mando</div>
    <div class="setup-sub">Introduce el canal del marcador.<br>Lo encontrarás en Ajustes de la app.</div>
    <input class="setup-input" id="ch-input" placeholder="padel-xxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="setup-btn" onclick="connectChannel()">Conectar</button>
  </div>
</div>

<!-- APP -->
<div class="app">
  <div class="status">
    <div class="status-left">
      <div class="dot" id="dot"></div>
      <div class="status-txt" id="stxt">SIN CONEXIÓN</div>
    </div>
    <div class="pista-sel">
      <button class="ps-btn" data-p="1" onclick="switchPista(1)">P1</button>
      <button class="ps-btn" data-p="2" onclick="switchPista(2)">P2</button>
      <button class="ps-btn" data-p="3" onclick="switchPista(3)">P3</button>
    </div>
  </div>

  <div class="score-display" id="score-display">
    <div class="score-header">
      <div></div>
      <div class="col-header">PTS</div>
      <div class="col-header">J</div>
      <div class="col-header">S</div>
    </div>
    <div class="score-grid">
      <div class="score-name s1" id="sn1">PAREJA A</div>
      <div class="score-pts s1" id="spt1">0</div>
      <div class="score-games" id="sgm1">0</div>
      <div class="score-sets" id="sst1">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-grid">
      <div class="score-name s2" id="sn2">PAREJA B</div>
      <div class="score-pts s2" id="spt2">0</div>
      <div class="score-games" id="sgm2">0</div>
      <div class="score-sets" id="sst2">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-meta" id="score-meta">
      <div class="score-serve" id="serve-info">— Esperando —</div>
    </div>
  </div>

  <div class="action-area">
    <div class="main-btns">
      <button class="score-btn b1" id="btn1" onclick="sendPoint(1)">
        <div class="btn-ico">+1</div>
        <div class="btn-name" id="btn-nm1">P. A</div>
        <div class="btn-label">Punto</div>
      </button>
      <button class="score-btn b2" id="btn2" onclick="sendPoint(2)">
        <div class="btn-ico">+1</div>
        <div class="btn-name" id="btn-nm2">P. B</div>
        <div class="btn-label">Punto</div>
      </button>
    </div>
    <div class="secondary-btns">
      <button class="sec-btn" onclick="sendUndo()">
        <div class="ico">↩</div>
        <div class="lbl">Deshacer</div>
      </button>
      <button class="sec-btn" onclick="showSetup()">
        <div class="ico">⚙</div>
        <div class="lbl">Canal</div>
      </button>
    </div>
  </div>

  <div class="feedback" id="fb">— listo —</div>
</div>

<script>
'use strict';
const NTFY = 'https://ntfy.sh';
const PTLBL = ['0','15','30','40'];
let ch = '', currentPista = 1;
let evtSrc = null, reconnTimer = null, sending = false;
let state = null;

function init() {
  const urlCh = new URLSearchParams(location.search).get('ch');
  if (urlCh) {
    ch = urlCh.trim();
    localStorage.setItem('ag_watch_ch', ch);
    history.replaceState({}, '', location.pathname);
  } else {
    ch = localStorage.getItem('ag_watch_ch') || '';
  }
  const savedPista = parseInt(localStorage.getItem('ag_watch_pista') || '1');
  switchPista(savedPista, true);
  if (ch) { hideSetup(); startConnection(); }
  else showSetup();

  // Listen via BroadcastChannel too
  try {
    const bc = new BroadcastChannel('agpadel');
    bc.onmessage = e => {
      if (e.data?.pista === currentPista && e.data?.state) {
        state = e.data.state;
        renderState();
        setStatus('green','EN VIVO');
      }
    };
  } catch(e) {}
}

function switchPista(p, silent) {
  currentPista = p;
  if (!silent) localStorage.setItem('ag_watch_pista', p);
  document.querySelectorAll('.ps-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.p) === p);
  });
  // Try to load from localStorage
  try {
    const raw = localStorage.getItem('ag_match_pista_'+p);
    if (raw) { state = JSON.parse(raw); renderState(); }
  } catch(e) {}
}

function showSetup() { document.getElementById('setup-overlay').classList.remove('hidden'); }
function hideSetup() { document.getElementById('setup-overlay').classList.add('hidden'); }

function connectChannel() {
  const v = document.getElementById('ch-input').value.trim().toLowerCase();
  if (!v) return;
  ch = v; localStorage.setItem('ag_watch_ch', ch);
  hideSetup(); startConnection();
}

function startConnection() {
  setStatus('yellow','CONECTANDO');
  clearTimeout(reconnTimer);
  if (evtSrc) { try{evtSrc.close();}catch(e){} }
  evtSrc = new EventSource(`${NTFY}/${ch}-state/sse`);
  evtSrc.onopen = () => setStatus('green','EN VIVO');
  evtSrc.addEventListener('message', e => {
    try {
      const env = JSON.parse(e.data);
      const msg = typeof env.message==='string' ? env.message : JSON.stringify(env);
      const d = JSON.parse(msg);
      if (d?.pts) { state=d; renderState(); setStatus('green','EN VIVO'); }
    } catch(err) {}
  });
  evtSrc.onerror = () => {
    setStatus('red','SIN SEÑAL');
    try{evtSrc.close();}catch(e){}
    evtSrc=null;
    reconnTimer=setTimeout(startConnection,4000);
  };
}

async function sendPoint(team) {
  if (sending) return;
  sending = true;
  setFb('Enviando...','');
  try {
    const r = await fetch(`${NTFY}/${ch}`,{
      method:'POST',
      headers:{'Content-Type':'text/plain','Title':'punto'},
      body:String(team)
    });
    setFb(r.ok ? '✓ Punto anotado' : '✗ Error '+r.status, r.ok?'ok':'err');
  } catch(e) { setFb('✗ Sin red','err'); }
  sending = false;
}

async function sendUndo() {
  setFb('Deshaciendo...','');
  try {
    const r = await fetch(`${NTFY}/${ch}`,{
      method:'POST',
      headers:{'Content-Type':'text/plain','Title':'punto'},
      body:'undo'
    });
    setFb(r.ok?'↩ Deshecho':'✗ Error','ok');
  } catch(e) { setFb('✗ Sin red','err'); }
}

function renderState() {
  if (!state) return;
  const p=state.pts||[0,0], g=state.games||[0,0], s=state.sets||[0,0];
  const n=state.names||['PAREJA A','PAREJA B'];
  const tb=state.tiebreak, gld=state.gold;
  const adv0=!gld&&p[0]===4, adv1=!gld&&p[1]===4;
  const isGold=gld&&p[0]===3&&p[1]===3;

  document.getElementById('sn1').textContent = n[0];
  document.getElementById('sn2').textContent = n[1];
  document.getElementById('btn-nm1').textContent = n[0].split(' / ')[0] || n[0];
  document.getElementById('btn-nm2').textContent = n[1].split(' / ')[0] || n[1];

  if (tb) {
    document.getElementById('spt1').textContent = p[0];
    document.getElementById('spt2').textContent = p[1];
  } else {
    document.getElementById('spt1').textContent = isGold?'🥇':adv0?'AD':adv1?'–':(PTLBL[p[0]]||'0');
    document.getElementById('spt2').textContent = isGold?'🥇':adv1?'AD':adv0?'–':(PTLBL[p[1]]||'0');
  }
  document.getElementById('sgm1').textContent = g[0];
  document.getElementById('sgm2').textContent = g[1];
  document.getElementById('sst1').textContent = s[0];
  document.getElementById('sst2').textContent = s[1];

  // Meta badges
  let meta = '';
  if (tb) meta += '<span class="score-badge badge-tb">TIEBREAK</span>';
  else if (isGold) meta += '<span class="score-badge badge-gold">🥇 ORO</span>';
  else if (adv0||adv1) meta += '<span class="score-badge badge-adv">VENTAJA</span>';
  if (state.server) meta += `<span class="score-serve">🎾 Saca ${(n[state.server-1]||'').split(' / ')[0]}</span>`;
  document.getElementById('score-meta').innerHTML = meta || '<span class="score-serve">— —</span>';

  if (state.matchOver) setStatus('yellow','PARTIDO FIN');
}

function setStatus(color, txt) {
  const dot=document.getElementById('dot');
  dot.className='dot'+(color==='green'?' green':color==='red'?' red':color==='yellow'?' yellow':'');
  document.getElementById('stxt').textContent=txt;
}

let fbT;
function setFb(msg,cls) {
  clearTimeout(fbT);
  const el=document.getElementById('fb');
  el.textContent=msg; el.className='feedback'+(cls?' '+cls:'');
  fbT=setTimeout(()=>{ el.textContent='— listo —'; el.className='feedback'; },2000);
}

init();
</script>
</body>
</html>
